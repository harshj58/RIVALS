<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rivals: Definitive Edition</title>
    <style>
        :root { --rivals-green: #00ff66; --rivals-blue: #00ccff; --ui-panel: rgba(0,0,0,0.9); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; color: #fff; }
        
        /* CROSSHAIR */
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; z-index: 1000; pointer-events: none; display: none; }
        #crosshair::before { content: ''; position: absolute; top: 9px; left: 0; width: 20px; height: 2px; background: var(--rivals-green); }
        #crosshair::after { content: ''; position: absolute; left: 9px; top: 0; width: 2px; height: 20px; background: var(--rivals-green); }

        /* INTERACT PROMPT */
        #interact-ui { position: fixed; top: 60%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; pointer-events: none; }
        .prompt { background: var(--rivals-green); color: #000; padding: 10px 20px; font-size: 20px; font-weight: 900; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }

        /* WEAPON SELECTION OVERLAY (AFTER STARTING MATCH) */
        #weapon-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #grid-container { width: 80%; height: 60vh; background: var(--ui-panel); border: 4px solid #fff; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 20px; overflow-y: auto; }
        .wpn-card { background: #222; border: 2px solid #444; padding: 15px; cursor: pointer; text-align: center; }
        .wpn-card:hover { border-color: var(--rivals-blue); background: #333; }
        .wpn-card.active { border-color: var(--rivals-green); box-shadow: 0 0 15px var(--rivals-green); }

        /* HUD */
        #hud { position: absolute; bottom: 40px; left: 40px; pointer-events: none; display: none; }
        #hp-bg { width: 300px; height: 30px; background: #111; border: 3px solid #fff; }
        #hp-bar { width: 100%; height: 100%; background: var(--rivals-green); transition: 0.1s; }
        
        #killfeed { position: absolute; top: 100px; right: 20px; text-align: right; }
        .kill { background: rgba(0,0,0,0.6); padding: 8px 20px; margin-bottom: 5px; border-right: 5px solid var(--rivals-green); font-size: 14px; }

        #match-ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 50px; font-size: 28px; font-weight: 900; display: none; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="match-ui">YOU: <span id="p-score">0</span> - BOT: <span id="b-score">0</span></div>
    
    <div id="interact-ui">
        <div class="prompt">CLICK TO START MATCH</div>
    </div>

    <div id="weapon-screen">
        <h1 style="font-size: 50px; color: var(--rivals-blue);">SELECT YOUR GEAR</h1>
        <div id="grid-container"></div>
        <button onclick="confirmLoadout()" style="margin-top: 20px; padding: 15px 50px; background: var(--rivals-green); font-weight: 900; border: none; cursor: pointer;">DEPLOY</button>
    </div>

    <div id="hud">
        <div id="hp-bg"><div id="hp-bar"></div></div>
        <h2 id="gun-name-display" style="text-transform: uppercase; margin-top: 10px;">-</h2>
    </div>

    <div id="killfeed"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let isMatch = false, hp = 150, botHp = 150, pScore = 0, bScore = 0;
        let selectedId = 0;

        // --- 1. PHYSICS ENGINE ---
        const world = new CANNON.World();
        world.gravity.set(0, -25, 0);
        const pBody = new CANNON.Body({ mass: 1, fixedRotation: true });
        pBody.addShape(new CANNON.Sphere(0.8));
        pBody.position.set(0, 5, 20); // Spawn in the Lobby section
        world.addBody(pBody);

        // --- 2. THREE.JS SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // GRID TEXTURE
        const ctx = document.createElement('canvas').getContext('2d');
        ctx.canvas.width = 64; ctx.canvas.height = 64;
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,64,64);
        ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1; ctx.strokeRect(0,0,64,64);
        const gridTex = new THREE.CanvasTexture(ctx.canvas);
        gridTex.wrapS = gridTex.wrapT = THREE.RepeatWrapping;
        gridTex.repeat.set(150, 150);

        const arenaMat = new THREE.MeshStandardMaterial({ map: gridTex });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), arenaMat);
        floor.rotation.x = -Math.PI/2;
        floor.receiveShadow = true;
        scene.add(floor);

        function box(x,y,z,w,h,d, color = 0xffffff) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({map: gridTex, color: color}));
            m.position.set(x,y,z); m.castShadow = m.receiveShadow = true;
            scene.add(m);
            const b = new CANNON.Body({ mass: 0 });
            b.addShape(new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)));
            b.position.set(x,y,z); world.addBody(b);
            return m;
        }

        // LOBBY / SHOOTING RANGE AREA
        box(0, 1, 30, 20, 0.2, 20, 0xaaaaaa); // Elevated Lobby Floor
        const startTerminal = box(0, 2, 22, 4, 3, 1, 0x00ff66); // The Match Start Button/Terminal

        // ARENA OBSTACLES (From Screenshot)
        box(0, 4, -15, 8, 8, 8); // Central Block
        box(-18, 3, -10, 6, 6, 6); // Side Block L
        box(18, 3, -10, 6, 6, 6); // Side Block R

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.7);
        sun.position.set(50, 100, 50); sun.castShadow = true;
        scene.add(sun);

        // --- 3. BOT HUMAN_OID ---
        const bot = new THREE.Group();
        const bTorso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.3, 0.5), new THREE.MeshStandardMaterial({color: 0xff4444}));
        const bHead = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0x222}));
        bHead.position.y = 1;
        const bLArm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.9, 0.3), new THREE.MeshStandardMaterial({color: 0xff4444}));
        bLArm.position.set(-0.7, 0.2, 0);
        const bRArm = bLArm.clone(); bRArm.position.x = 0.7;
        bot.add(bTorso, bHead, bLArm, bRArm);
        bot.position.set(0, 1.2, -30);
        scene.add(bot);
        bot.visible = false; // Hide until match starts

        // --- 4. WEAPON SYSTEMS ---
        const gunPivot = new THREE.Group();
        camera.add(gunPivot);
        const wData = [
            { name: "Phantom", type: "Rifle", color: 0x222222 },
            { name: "Neon", type: "Sniper", color: 0x00ccff },
            { name: "Executioner", type: "Shotgun", color: 0x442222 },
            { name: "Wasp", type: "SMG", color: 0x111111 },
            { name: "Titan", type: "Heavy", color: 0x555555 }
        ];

        function buildGun(id) {
            while(gunPivot.children.length > 0) gunPivot.remove(gunPivot.children[0]);
            const d = wData[id % wData.length];
            const m = new THREE.MeshStandardMaterial({ color: d.color });
            
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.25, 0.6), m);
            gunPivot.add(body);
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.8), new THREE.MeshStandardMaterial({color:0x000}));
            barrel.rotation.x = 1.57; barrel.position.z = -0.5;
            gunPivot.add(barrel);
            
            gunPivot.position.set(0.4, -0.4, -0.7);
            document.getElementById('gun-name-display').innerText = d.name;
        }

        const grid = document.getElementById('grid-container');
        for(let i=0; i<52; i++) {
            const c = document.createElement('div');
            c.className = 'wpn-card';
            c.innerHTML = `<b>${wData[i % wData.length].name}</b><br>V${i+1}`;
            c.onclick = () => {
                document.querySelectorAll('.wpn-card').forEach(x => x.classList.remove('active'));
                c.classList.add('active'); selectedId = i;
            };
            grid.appendChild(c);
        }

        // --- 5. COMBAT LOGIC ---
        function shoot() {
            // Flash
            const light = new THREE.PointLight(0xffff00, 4, 3);
            light.position.set(0.4, -0.4, -1.2); camera.add(light);
            setTimeout(() => camera.remove(light), 50);

            // Tracer
            const pts = [new THREE.Vector3(0.4,-0.4,-0.8), new THREE.Vector3(0.4,-0.4,-100)];
            const trace = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({color: 0xffff00}));
            camera.add(trace);
            setTimeout(() => camera.remove(trace), 40);

            // Hit Detection
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObject(bot, true);
            if(hits.length > 0 && isMatch) {
                botHp -= 40;
                if(botHp <= 0) {
                    pScore++; document.getElementById('p-score').innerText = pScore;
                    botHp = 150;
                    addKillMsg("YOU ELIMINATED BOT_RIVAL");
                    bot.position.set(Math.random()*40-20, 1.2, -Math.random()*30 - 10);
                }
            }
        }

        function addKillMsg(t) {
            const d = document.createElement('div'); d.className = 'kill'; d.innerText = t;
            document.getElementById('killfeed').appendChild(d);
            setTimeout(() => d.remove(), 3000);
        }

        // --- 6. CORE LOOP & INPUTS ---
        const keys = {};
        window.onkeydown = e => { 
            keys[e.key.toLowerCase()] = true; 
            if(e.key === ' ' && Math.abs(pBody.velocity.y) < 0.1) pBody.velocity.y = 12; 
        };
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });

        window.onmousedown = e => {
            if (document.pointerLockElement !== document.body) {
                document.body.requestPointerLock();
                return;
            }
            if (isMatch) {
                if(e.button === 0) shoot();
            } else {
                // Check if looking at start terminal
                const ray = new THREE.Raycaster();
                ray.setFromCamera(new THREE.Vector2(0,0), camera);
                if(ray.intersectObject(startTerminal).length > 0) {
                    document.exitPointerLock();
                    document.getElementById('weapon-screen').style.display = 'flex';
                }
            }
        };

        function loop() {
            requestAnimationFrame(loop);
            world.step(1/60);

            let s = keys['shift'] ? 0.45 : 0.22;
            let m = new THREE.Vector3(0,0,0);
            if(keys['w']) m.z -= s; if(keys['s']) m.z += s;
            if(keys['a']) m.x -= s; if(keys['d']) m.x += s;
            m.applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0, camera.rotation.y, 0)));
            pBody.position.x += m.x; pBody.position.z += m.z;
            camera.position.copy(pBody.position); camera.position.y += 0.8;

            // UI Interaction check
            if(!isMatch) {
                const ray = new THREE.Raycaster();
                ray.setFromCamera(new THREE.Vector2(0,0), camera);
                document.getElementById('interact-ui').style.display = ray.intersectObject(startTerminal).length > 0 ? 'block' : 'none';
            }

            renderer.render(scene, camera);
        }

        window.confirmLoadout = () => {
            document.getElementById('weapon-screen').style.display = 'none';
            document.body.requestPointerLock();
            isMatch = true;
            bot.visible = true;
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('match-ui').style.display = 'block';
            buildGun(selectedId);
            pBody.position.set(0, 5, 0); // Teleport to the arena floor
        };

        window.oncontextmenu = e => e.preventDefault();
        loop();
    </script>
</body>
</html>

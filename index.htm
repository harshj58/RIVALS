<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rivals Web - All Weapons</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010409; font-family: 'Courier New', Courier, monospace; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 1px solid #00ffff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #ui { position: absolute; bottom: 30px; left: 30px; color: #00ffff; text-shadow: 0 0 10px cyan; pointer-events: none; }
        #weapon-dock { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,20,40,0.8); padding: 10px; border: 1px solid cyan; }
        .slot { width: 50px; height: 50px; border: 1px solid #444; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .active { border-color: cyan; box-shadow: 0 0 10px cyan; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui">
        <h2 id="curWeapon">ASSAULT RIFLE</h2>
        <div id="abilityStatus">READY [RIGHT CLICK]</div>
    </div>

    <div id="weapon-dock">
        <div class="slot active" id="slot1">1</div>
        <div class="slot" id="slot2">2</div>
        <div class="slot" id="slot3">3</div>
        <div class="slot" id="slot4">4</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE & ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010205);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ARENA SETUP (Rivals Blue/Cyan) ---
        const grid = new THREE.GridHelper(200, 60, 0x00ffff, 0x001111);
        scene.add(grid);

        // --- WEAPON DEFINITIONS ---
        const weapons = {
            1: { name: "ASSAULT RIFLE", color: 0x555555, size: [0.1, 0.2, 0.8], fov: 60, ability: "Steady Aim" },
            2: { name: "SNIPER", color: 0x222222, size: [0.08, 0.15, 1.4], fov: 15, ability: "Thermal Scope" },
            3: { name: "PAINTBALL GUN", color: 0xff00ff, size: [0.2, 0.3, 0.6], fov: 70, ability: "Rapid Splat" },
            4: { name: "SHORTY", color: 0x880000, size: [0.25, 0.25, 0.5], fov: 75, ability: "Burst Fire" }
        };
        let currentSlot = 1;
        let gunMesh;

        function createGun(slot) {
            if(gunMesh) camera.remove(gunMesh);
            const w = weapons[slot];
            const geo = new THREE.BoxGeometry(...w.size);
            const mat = new THREE.MeshStandardMaterial({ color: w.color, emissive: w.color, emissiveIntensity: 0.2 });
            gunMesh = new THREE.Mesh(geo, mat);
            gunMesh.position.set(0.5, -0.4, -0.7);
            camera.add(gunMesh);
            document.getElementById('curWeapon').innerText = w.name;
        }

        // --- PLAYER & MOVEMENT ---
        const player = new THREE.Group();
        scene.add(player);
        player.add(camera);
        camera.position.y = 1.7;
        createGun(1);

        const keys = {};
        window.onkeydown = (e) => {
            keys[e.key.toLowerCase()] = true;
            if(['1','2','3','4'].includes(e.key)) {
                currentSlot = e.key;
                createGun(e.key);
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                document.getElementById('slot'+e.key).classList.add('active');
            }
        };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        // --- COMBAT & ABILITIES ---
        window.onmousedown = (e) => {
            if(e.button === 0) { // LEFT CLICK: Shoot
                gunMesh.position.z += 0.15; // Kickback
                setTimeout(() => gunMesh.position.z -= 0.15, 40);
            }
            if(e.button === 2) { // RIGHT CLICK: Special Ability
                camera.fov = weapons[currentSlot].fov;
                camera.updateProjectionMatrix();
                if(currentSlot == 2) scene.background = new THREE.Color(0x220000); // Sniper "Thermal" effect
            }
        };
        window.onmouseup = (e) => {
            if(e.button === 2) {
                camera.fov = 75;
                camera.updateProjectionMatrix();
                scene.background = new THREE.Color(0x010205);
            }
        };

        // --- BOT AVATARS ---
        const bots = [];
        for(let i=0; i<5; i++) {
            const bot = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({color: 0xff0044}));
            bot.position.set(Math.random()*40-20, 1, Math.random()*40-20);
            scene.add(bot);
            bots.push(bot);
        }

        // --- ENGINE LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            let speed = (keys['e'] || keys['shift']) ? 0.35 : 0.18;
            
            // Apply requested movement logic
            let moveX = 0, moveZ = 0;
            if(keys['w']) moveZ -= speed;
            if(keys['s']) moveZ += speed;
            if(keys['a']) moveX -= speed;
            if(keys['d']) moveX += speed;

            const moveVec = new THREE.Vector3(moveX, 0, moveZ).applyQuaternion(player.quaternion);
            player.position.add(moveVec);

            // Simple Recoil smoothing
            gunMesh.position.lerp(new THREE.Vector3(0.5, -0.4, -0.7), 0.1);

            renderer.render(scene, camera);
        }

        // Mouse Lock Setup
        document.body.onclick = () => document.body.requestPointerLock();
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body) {
                player.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });

        window.oncontextmenu = (e) => e.preventDefault();
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rivals Web - Final Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; mix-blend-mode: difference; }
        
        /* THE LOBBY */
        #lobby { position: absolute; inset: 0; background: radial-gradient(circle, #222, #000); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #weapon-grid { display: grid; grid-template-columns: repeat(4, 150px); gap: 15px; margin: 20px; max-height: 450px; overflow-y: auto; padding: 20px; border: 5px solid #fff; background: rgba(255,255,255,0.1); }
        .weapon-card { padding: 15px; background: #333; border: 2px solid #555; cursor: pointer; transition: 0.2s; font-size: 12px; }
        .weapon-card:hover { background: #00ffcc; color: #000; transform: scale(1.05); }
        .selected { border-color: #00ffcc; box-shadow: 0 0 15px #00ffcc; }
        #start-btn { padding: 20px 80px; font-size: 30px; background: #00ffcc; border: 6px solid #000; cursor: pointer; font-weight: 900; margin-top: 20px; }

        /* HUD */
        #hud { position: absolute; bottom: 40px; left: 40px; color: white; pointer-events: none; }
        #hp-box { width: 300px; height: 35px; background: #111; border: 4px solid white; position: relative; }
        #hp-bar { width: 100%; height: 100%; background: #00ff66; transition: 0.1s; }
        #slide-cooldown { width: 100px; height: 6px; background: #333; margin-top: 8px; }
        #slide-fill { width: 100%; height: 100%; background: #00ffff; }
        #weapon-display { position: absolute; bottom: 40px; right: 40px; text-align: right; color: white; -webkit-text-stroke: 1px black; }

        /* SCORING */
        #score-strip { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: white; border: 5px solid black; padding: 10px 40px; display: flex; gap: 30px; font-size: 35px; font-weight: 900; z-index: 10; }
        #win-txt { display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; color: #00ffcc; -webkit-text-stroke: 4px black; z-index: 1000; }
    </style>
</head>
<body>

    <div id="win-txt">ROUND WON</div>

    <div id="lobby">
        <h1 style="font-size: 50px; margin: 0;">RIVALS ARENA</h1>
        <p>CHOOSE YOUR WEAPON</p>
        <div id="weapon-grid"></div>
        <button id="start-btn" onclick="deploy()">DEPLOY</button>
    </div>

    <div id="score-strip">
        <span style="color:blue">YOU: <span id="p-score">0</span></span>
        <span>-</span>
        <span style="color:red">BOT: <span id="b-score">0</span></span>
    </div>

    <div id="hud">
        <div id="hp-box"><div id="hp-bar"></div></div>
        <p>HP: <span id="hp-num">150</span>/150</p>
        <div id="slide-cooldown"><div id="slide-fill"></div></div>
    </div>

    <div id="weapon-display">
        <h1 id="cur-gun-name" style="margin:0; font-size: 50px;">NONE</h1>
        <p id="cur-gun-type" style="margin:0; font-weight:bold; letter-spacing: 2px;">V0</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let isPlaying = false;
        let pScore = 0, bScore = 0, hp = 150, bHp = 150;
        let selectedWeaponIdx = 0;

        // --- 1. THE PHYSICS (Anti-Phase) ---
        const world = new CANNON.World();
        world.gravity.set(0, -20, 0);
        
        const playerBody = new CANNON.Body({ mass: 70, fixedRotation: true });
        playerBody.addShape(new CANNON.Sphere(0.8));
        playerBody.position.set(0, 5, 0);
        world.addBody(playerBody);

        const groundBody = new CANNON.Body({ mass: 0 });
        groundBody.addShape(new CANNON.Plane());
        groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
        world.addBody(groundBody);

        // --- 2. THE SCENE (Rivals White Arena) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xaaccff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,128,128);
        ctx.strokeStyle = '#cccccc'; ctx.lineWidth = 4; ctx.strokeRect(0,0,128,128);
        const gridTex = new THREE.CanvasTexture(canvas);
        gridTex.wrapS = gridTex.wrapT = THREE.RepeatWrapping;
        gridTex.repeat.set(80, 80);

        const arenaMat = new THREE.MeshStandardMaterial({ map: gridTex });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), arenaMat);
        floor.rotation.x = -Math.PI/2;
        floor.receiveShadow = true;
        scene.add(floor);

        function makeWall(x, y, z, w, h, d) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), arenaMat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            const body = new CANNON.Body({ mass: 0 });
            body.addShape(new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)));
            body.position.set(x, y, z);
            world.addBody(body);
        }

        // Exact Obstacles from Screenshot
        makeWall(0, 4, -20, 10, 8, 10);   // Center
        makeWall(-18, 3, -15, 6, 6, 6);  // Side L
        makeWall(18, 3, -15, 6, 6, 6);   // Side R
        makeWall(-15, 2, 15, 8, 4, 4);   // Back Cover L

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.7);
        sun.position.set(50, 80, 30);
        sun.castShadow = true;
        scene.add(sun);

        // --- 3. BOT AVATAR (Proper Character) ---
        const bot = new THREE.Group();
        const bTorso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1, 0.4), new THREE.MeshStandardMaterial({color: 0xff0000}));
        const bHead = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0x000000}));
        bHead.position.y = 0.8;
        const bArmL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), new THREE.MeshStandardMaterial({color: 0xff0000}));
        bArmL.position.set(-0.6, 0.1, 0);
        const bArmR = bArmL.clone(); bArmR.position.x = 0.6;
        bot.add(bTorso, bHead, bArmL, bArmR);
        bot.position.set(0, 1.2, -35);
        scene.add(bot);

        // --- 4. THE 52 WEAPON LIST ---
        const gunParts = new THREE.Group();
        camera.add(gunParts);

        const weaponNames = ["Phantom", "Viper", "Executioner", "Slayer", "Wasp", "Striker", "Cobra", "Dragon"];
        const weaponTypes = ["Sniper", "AR", "Shotgun", "SMG", "Handgun", "Launcher"];

        for(let i=0; i<52; i++) {
            const card = document.createElement('div');
            card.className = 'weapon-card';
            const name = weaponNames[i % weaponNames.length] + " " + (i+1);
            card.innerHTML = `<b>${name}</b><br>${weaponTypes[i % weaponTypes.length]}`;
            card.onclick = () => {
                document.querySelectorAll('.weapon-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedWeaponIdx = i;
                build3DGun(i);
            };
            document.getElementById('weapon-grid').appendChild(card);
        }

        function build3DGun(id) {
            while(gunParts.children.length > 0) gunParts.remove(gunParts.children[0]);
            const mat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const barrelMat = new THREE.MeshStandardMaterial({ color: 0x050505 });

            // Distinctive Model Generator
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.25, 0.6), mat);
            gunParts.add(body);

            let bLen = 0.6 + (id * 0.015);
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, bLen), barrelMat);
            barrel.rotation.x = 1.57; barrel.position.z = -(0.3 + bLen/2);
            gunParts.add(barrel);

            if(id % 2 === 0) { // Add Scope
                const scope = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.3), barrelMat);
                scope.rotation.x = 1.57; scope.position.y = 0.2; gunParts.add(scope);
            }
            if(id % 3 === 0) { // Add Stock
                const stock = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.25, 0.4), mat);
                stock.position.z = 0.4; gunParts.add(stock);
            }

            gunParts.position.set(0.4, -0.4, -0.7);
            document.getElementById('cur-gun-name').innerText = weaponNames[id % weaponNames.length].toUpperCase();
            document.getElementById('cur-gun-type').innerText = "VERSION " + (id+1);
        }

        // --- 5. INPUTS & MOVEMENT ---
        const keys = {};
        let canSlide = true, isSliding = false;

        window.onkeydown = (e) => {
            keys[e.key.toLowerCase()] = true;
            if(e.key === 'Tab') { e.preventDefault(); }
            if((e.key === 'e' || e.shiftKey) && canSlide) startSlide();
        };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function startSlide() {
            isSliding = true; canSlide = false;
            document.getElementById('slide-fill').style.width = '0%';
            setTimeout(() => isSliding = false, 600);
            setTimeout(() => { canSlide = true; document.getElementById('slide-fill').style.width = '100%'; }, 1600);
        }

        // Mouse Fix (Up is Up, Down is Down)
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                // FIX: Subtraction makes Up look Up, Addition makes Up look Down.
                camera.rotation.x -= e.movementY * 0.002; 
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });

        window.onmousedown = (e) => {
            if(!isPlaying) return;
            if(e.button === 0) {
                gunParts.position.z += 0.2; setTimeout(() => gunParts.position.z -= 0.2, 50);
                bHp -= 30;
                if(bHp <= 0) {
                    pScore++; document.getElementById('p-score').innerText = pScore;
                    document.getElementById('win-txt').style.display = 'block';
                    setTimeout(() => document.getElementById('win-txt').style.display = 'none', 1500);
                    bHp = 150; bot.position.set(Math.random()*40-20, 1.2, -Math.random()*40);
                }
            }
            if(e.button === 2) { camera.fov = 30; camera.updateProjectionMatrix(); }
        };
        window.onmouseup = (e) => { if(e.button === 2) { camera.fov = 75; camera.updateProjectionMatrix(); } };

        // --- 6. GAME LOOP ---
        function frame() {
            requestAnimationFrame(frame);
            world.step(1/60);

            if(isPlaying) {
                let speed = isSliding ? 0.8 : 0.22;
                let moveVec = new THREE.Vector3(0,0,0);
                if(keys['w']) moveVec.z -= speed; if(keys['s']) moveVec.z += speed;
                if(keys['a']) moveVec.x -= speed; if(keys['d']) moveVec.x += speed;

                moveVec.applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0, camera.rotation.y, 0)));
                playerBody.position.x += moveVec.x;
                playerBody.position.z += moveVec.z;

                camera.position.copy(playerBody.position);
                camera.position.y += isSliding ? -0.4 : 0.8;

                if(Math.random() < 0.02) {
                    hp -= 0.5;
                    document.getElementById('hp-bar').style.width = (hp/150*100) + "%";
                    document.getElementById('hp-num').innerText = Math.max(0, Math.floor(hp));
                }
            }
            renderer.render(scene, camera);
        }

        window.deploy = () => {
            document.getElementById('lobby').style.display = 'none';
            document.body.requestPointerLock();
            isPlaying = true;
        };

        window.oncontextmenu = e => e.preventDefault();
        build3DGun(0);
        frame();
    </script>
</body>
</html>

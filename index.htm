<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivals Web Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            width: 10px; height: 10px; border: 2px solid white; 
            border-radius: 50%; transform: translate(-50%, -50%); 
        }
        #leaderboard {
            display: none; position: absolute; top: 20%; left: 35%; 
            width: 30%; background: rgba(0,0,0,0.8); color: gold; 
            padding: 20px; border: 2px solid #444;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>Health: 100</div>
        <div>Weapon: Assault Rifle</div>
    </div>
    <div id="crosshair"></div>
    <div id="leaderboard">
        <h3>ARENA LEADERBOARD</h3>
        <p>Player: 0 Ping</p>
        <p>Bot_Sniper: 15 Ping</p>
        <p>Bot_Shorty: 22 Ping</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup Scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- The "Arena" Map ---
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Simple Arena Walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
        const wallGeo = new THREE.BoxGeometry(100, 10, 1);
        const wall1 = new THREE.Mesh(wallGeo, wallMat);
        wall1.position.set(0, 5, -50);
        scene.add(wall1);

        // --- Player Logic ---
        const player = new THREE.Group();
        scene.add(player);
        camera.position.set(0, 1.6, 0); 
        player.add(camera);

        // Movement State
        const keys = {};
        let isSliding = false;

        document.addEventListener('keydown', (e) => { 
            keys[e.key.toLowerCase()] = true;
            if (e.key === 'Tab') { 
                e.preventDefault(); 
                document.getElementById('leaderboard').style.display = 'block'; 
            }
        });
        document.addEventListener('keyup', (e) => { 
            keys[e.key.toLowerCase()] = false;
            if (e.key === 'Tab') document.getElementById('leaderboard').style.display = 'none';
        });

        // Pointer Lock for Aiming
        document.body.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                player.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        // --- Game Loop (Input Handling) ---
        function update() {
            const speed = (keys['shift'] || keys['e']) ? 0.3 : 0.15; // Slide / Sprint
            const direction = new THREE.Vector3();

            // Movement Logic
            if (keys['w'] && keys['a']) { // Northwest
                direction.z -= speed; direction.x -= speed;
            } else if (keys['s'] && keys['d']) { // Southeast
                direction.z += speed; direction.x += speed;
            } else if (keys['a'] && keys['d']) { // Northeast (Logic override per your request)
                direction.z -= speed; direction.x += speed;
            } else if (keys['a'] && keys['s']) { // Southwest
                direction.z += speed; direction.x -= speed;
            } else if (keys['w']) direction.z -= speed;
            else if (keys['s']) direction.z += speed;
            else if (keys['a']) direction.x -= speed;
            else if (keys['d']) direction.x += speed;

            direction.applyQuaternion(player.quaternion);
            player.position.add(direction);

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        // --- Combat Controls ---
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0) console.log("Shoot (Left Click)");
            if (e.button === 2) console.log("Scope / Special (Right Click)");
        });

        window.addEventListener('contextmenu', e => e.preventDefault()); // Disable right-click menu

        update();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rivals - Ultimate Patch</title>
    <style>
        :root { --rivals-green: #00ff66; --rivals-blue: #00ccff; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; color: #fff; }
        
        /* CROSSHAIR */
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; z-index: 1000; pointer-events: none; border: 2px solid var(--rivals-green); border-radius: 50%; }

        /* INTERACT */
        #interact-ui { position: fixed; top: 60%; left: 50%; transform: translate(-50%, -50%); display: none; background: #fff; color: #000; padding: 15px 40px; font-weight: 900; border: 4px solid var(--rivals-green); }

        /* WEAPON LOADOUT (THE REAL ONE) */
        #weapon-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #grid { width: 90%; height: 60vh; background: #111; border: 5px solid #fff; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 30px; overflow-y: scroll; }
        .card { background: #222; border: 2px solid #444; padding: 20px; cursor: pointer; text-align: center; font-size: 14px; }
        .card:hover { border-color: var(--rivals-blue); background: #333; }
        .card.active { border-color: var(--rivals-green); background: #000; box-shadow: 0 0 20px var(--rivals-green); }

        /* HUD */
        #hud { position: absolute; bottom: 40px; left: 40px; }
        #hp-bar-outer { width: 300px; height: 30px; background: #000; border: 3px solid #fff; position: relative; }
        #hp-bar-inner { width: 100%; height: 100%; background: var(--rivals-green); transition: 0.1s; }
        
        #killfeed { position: absolute; top: 120px; right: 20px; text-align: right; }
        .kill-msg { background: rgba(0,0,0,0.7); padding: 10px 20px; margin-bottom: 5px; border-left: 5px solid var(--rivals-green); }

        #deploy-btn { margin-top: 30px; padding: 20px 100px; font-size: 30px; background: var(--rivals-green); border: none; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="interact-ui">CLICK TERMINAL TO START MATCH</div>

    <div id="weapon-screen">
        <h1 style="font-size: 50px;">CHOOSE WEAPON <span style="color:var(--rivals-blue)">(52 MODELS)</span></h1>
        <div id="grid"></div>
        <button id="deploy-btn" onclick="deploy()">START MATCH</button>
    </div>

    <div id="hud">
        <div id="hp-bar-outer"><div id="hp-bar-inner"></div></div>
        <h2 id="gun-name" style="letter-spacing: 5px; text-transform: uppercase;">READY</h2>
    </div>

    <div id="killfeed"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let isMatch = false, pScore = 0, botHp = 150, selectedId = 0;
        let canJump = true, isSliding = false;

        // --- 1. ROBUST PHYSICS (No Phasing) ---
        const world = new CANNON.World();
        world.gravity.set(0, -30, 0);
        
        const pBody = new CANNON.Body({ mass: 1, fixedRotation: true });
        pBody.addShape(new CANNON.Sphere(1.0)); // Larger hit sphere
        pBody.position.set(0, 10, 80); // Spawn in Lobby
        pBody.linearDamping = 0.5;
        world.addBody(pBody);

        // --- 2. THE MEGA MAP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const gridTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/grid.png');
        gridTex.wrapS = gridTex.wrapT = THREE.RepeatWrapping;
        gridTex.repeat.set(200, 200);

        const arenaMat = new THREE.MeshStandardMaterial({ map: gridTex, color: 0xffffff });

        function createObject(x, y, z, w, h, d, color = 0xffffff, isTerminal = false) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({map: gridTex, color: color}));
            m.position.set(x, y, z); m.castShadow = true; m.receiveShadow = true;
            scene.add(m);
            const b = new CANNON.Body({ mass: 0 });
            b.addShape(new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)));
            b.position.set(x, y, z);
            world.addBody(b);
            if(isTerminal) m.userData.terminal = true;
            return m;
        }

        // MASSIVE FLOORS (Thick to prevent phasing)
        createObject(0, -1, 0, 1000, 2, 1000, 0xeeeeee); // Main Arena Floor
        createObject(0, 2, 80, 60, 4, 60, 0xaaaaaa); // Lobby Platform

        // THE START TERMINAL
        const terminal = createObject(0, 6, 60, 4, 6, 2, 0x00ff66, true);

        // ARENA OBSTACLES
        createObject(0, 6, 0, 15, 12, 15); // Central Tower
        createObject(-25, 4, -10, 10, 8, 10); createObject(25, 4, -10, 10, 8, 10);

        scene.add(new THREE.AmbientLight(0xffffff, 1));

        // --- 3. DUMMIES & RIVAL BOT ---
        const bots = [];
        function spawnBot(x, y, z, isRealRival = false) {
            const group = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.8, 0.6), new THREE.MeshStandardMaterial({color: isRealRival ? 0xff0000 : 0x555555}));
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color: 0x222222}));
            head.position.y = 1.4;
            group.add(torso, head);
            group.position.set(x, y, z);
            scene.add(group);
            group.userData.hp = 150;
            group.userData.isRival = isRealRival;
            bots.push(group);
            return group;
        }

        // Practice Dummies in Lobby
        spawnBot(-15, 6, 70); spawnBot(15, 6, 70);
        // The Arena Rival (Hidden until match)
        const rival = spawnBot(0, 6, -40, true);
        rival.visible = false;

        // --- 4. 52 WEAPON FACTORY ---
        const gunGroup = new THREE.Group();
        camera.add(gunGroup);
        const weaponNames = ["Viper", "Wraith", "Phantom", "Slayer", "Neon", "Titan", "Cobra", "Reaper"];

        function buildGun(id) {
            while(gunGroup.children.length > 0) gunGroup.remove(gunGroup.children[0]);
            const color = id % 2 === 0 ? 0x222222 : 0x00ccff;
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.3, 0.8), new THREE.MeshStandardMaterial({color: color}));
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1), new THREE.MeshStandardMaterial({color: 0x000000}));
            barrel.rotation.x = 1.57; barrel.position.z = -0.7;
            gunGroup.add(body, barrel);
            gunGroup.position.set(0.5, -0.5, -1);
            document.getElementById('gun-name').innerText = weaponNames[id % weaponNames.length] + " V" + (id + 1);
        }

        const grid = document.getElementById('grid');
        for(let i=0; i<52; i++) {
            const c = document.createElement('div'); c.className = 'card';
            c.innerHTML = `<b>${weaponNames[i % weaponNames.length]}</b><br>v${i+1}`;
            c.onclick = () => { document.querySelectorAll('.card').forEach(x => x.classList.remove('active')); c.classList.add('active'); selectedId = i; };
            grid.appendChild(c);
        }

        // --- 5. CORE MECHANICS ---
        function fire() {
            const tracer = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0.5,-0.5,-1), new THREE.Vector3(0.5,-0.5,-200)]),
                new THREE.LineBasicMaterial({color: 0xffff00})
            );
            camera.add(tracer); setTimeout(() => camera.remove(tracer), 40);

            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(bots, true);
            if(hits.length > 0) {
                const target = hits[0].object.parent;
                target.userData.hp -= 50;
                if(target.userData.hp <= 0) {
                    const msg = document.createElement('div'); msg.className = 'kill-msg';
                    msg.innerText = target.userData.isRival ? "ELIMINATED RIVAL" : "DUMMY DESTROYED";
                    document.getElementById('killfeed').appendChild(msg); setTimeout(() => msg.remove(), 2000);
                    target.userData.hp = 150;
                    if(target.userData.isRival) target.position.set(Math.random()*60-30, 6, -Math.random()*50);
                }
            }
        }

        const keys = {};
        window.onkeydown = e => {
            keys[e.key.toLowerCase()] = true;
            if(e.key === ' ' && canJump) { pBody.velocity.y = 15; canJump = false; setTimeout(()=>canJump=true, 800); }
        };
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });

        window.onmousedown = e => {
            if (document.pointerLockElement !== document.body) { document.body.requestPointerLock(); return; }
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const termHit = ray.intersectObject(terminal);
            
            if(termHit.length > 0 && !isMatch) {
                document.exitPointerLock();
                document.getElementById('weapon-screen').style.display = 'flex';
            } else {
                fire();
            }
        };

        function loop() {
            requestAnimationFrame(loop);
            world.step(1/60);
            
            let s = 0.3;
            let m = new THREE.Vector3(0,0,0);
            if(keys['w']) m.z -= s; if(keys['s']) m.z += s;
            if(keys['a']) m.x -= s; if(keys['d']) m.x += s;
            m.applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0, camera.rotation.y, 0)));
            pBody.position.x += m.x; pBody.position.z += m.z;
            camera.position.copy(pBody.position); camera.position.y += 0.8;

            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            document.getElementById('interact-ui').style.display = (!isMatch && ray.intersectObject(terminal).length > 0) ? 'block' : 'none';

            renderer.render(scene, camera);
        }

        window.deploy = () => {
            document.getElementById('weapon-screen').style.display = 'none';
            document.body.requestPointerLock();
            isMatch = true;
            rival.visible = true;
            buildGun(selectedId);
            pBody.position.set(0, 10, 0); // TELEPORT TO ARENA
        };

        buildGun(0); loop();
    </script>
</body>
</html>
